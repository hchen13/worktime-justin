<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WorkTime Justin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="debug" class="debug-overlay" aria-hidden="true">
    <div>key: <span id="dbg-key">-</span></div>
    <div>mouse: <span id="dbg-mouse">-</span></div>
    <div>fps: <span id="dbg-fps">-</span></div>
    <div>audio: <span id="dbg-audio">locked</span></div>
  </div>

  <div id="esc-progress-wrap" class="esc-progress-wrap" aria-hidden="true">
    <div id="esc-progress-bar" class="esc-progress-bar"></div>
  </div>

  <script src="manifest.js"></script>
  <script src="app.js"></script>
</body>
</html>
