<!--
  WTJ-20260704-002 极薄原生壳 — web 层容器
  约束：Safari 14 兼容基线（ES2020 以内），Canvas2D，无外部依赖/网络请求，
  纯本地相对路径资源，可被 file:// 直接加载（供 WKWebView loadFileURL 使用）。
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WorkTime Justin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="hud.css" />
  <link rel="stylesheet" href="secretword.css" />
  <link rel="stylesheet" href="task-templates.css" />
  <link rel="stylesheet" href="status-rewards.css" />
  <link rel="stylesheet" href="reward-chest.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="debug" class="debug-overlay" aria-hidden="true">
    <div>key: <span id="dbg-key">-</span></div>
    <div>mouse: <span id="dbg-mouse">-</span></div>
    <div>fps: <span id="dbg-fps">-</span></div>
    <div>audio: <span id="dbg-audio">locked</span></div>
  </div>

  <div id="esc-progress-wrap" class="esc-progress-wrap" aria-hidden="true">
    <div id="esc-progress-bar" class="esc-progress-bar"></div>
  </div>

  <script src="manifest.js"></script>
  <!-- slots.js（010 五槽统一状态机）需在 keyboard.js 与 secretword.js 之前——这样两者首次
       点槽时 window.WTJ_SLOTS 已存在，走委托路径而非各自 fallback。只需 manifest.js 先加载；
       与 hud.js 加载顺序无强依赖（本文件对 WTJ_HUD 的调用发生在运行时，见 app/web/slots.js
       顶部注释）。见 app/web/slots/SLOTS-API.md。 -->
  <script src="slots.js"></script>
  <script src="keyboard.js"></script>
  <!-- pointer.js 需在 keyboard.js 之后、app.js 之前——app.js 初始化时要读
       window.WTJ_POINTER.onMove/onClickFeedback 完成订阅。见 app/web/pointer.js 顶部注释。 -->
  <script src="pointer.js"></script>
  <script src="app.js"></script>
  <script src="hud.js"></script>
  <!-- secretword.js 需在 keyboard.js 之后（订阅 WTJ_KEYBOARD.onLetter）；放在 hud.js 之后
       确保命中时 WTJ_HUD.setSlot 已就绪（五槽联动）。见 app/web/secretword/SECRETWORD-API.md。 -->
  <script src="secretword.js"></script>
  <!-- task.js（013 任务生命周期框架，此前未 wire，接入留 014/019）需在 hud.js/keyboard.js
       之后（订阅 WTJ_HUD.onQuestionClick、WTJ_KEYBOARD.onEffectiveKey）。见 app/web/task/TASK-API.md。 -->
  <script src="task.js"></script>
  <!-- task-templates.js（014 四类任务模板）需在 task.js/pointer.js/keyboard.js 之后——
       订阅 WTJ_TASK.onQuestionClicked、用 WTJ_POINTER.registerTarget、WTJ_KEYBOARD.onLetter。
       见 app/web/task-templates.js 顶部注释。 -->
  <script src="task-templates.js"></script>
  <!-- status-rewards.js（015 工作状态灯「今日工作完成」连续奖励）需在 task-templates.js
       之后——订阅它暴露的 WTJ_TASK_TEMPLATES.onTaskComplete 事件累计连续完成计数。见
       app/web/status-rewards.js 顶部注释。 -->
  <script src="status-rewards.js"></script>
  <!-- reward-chest.js（011 宝箱开启 + 烟花 + 一次性大奖励）需在 slots.js（010）之后——订阅它
       暴露的 WTJ_SLOTS.onFull 事件，五槽满时播放宝箱奖励序列，播完调用 WTJ_SLOTS.reset()
       清槽开新一轮。与 hud.js/audio.js 加载顺序无强依赖（调用均走防御式包装）。见
       app/web/reward-chest.js 顶部注释。 -->
  <script src="reward-chest.js"></script>
</body>
</html>
