<!--
  WTJ-20260704-002 极薄原生壳 — web 层容器
  约束：Safari 14 兼容基线（ES2020 以内），Canvas2D，无外部依赖/网络请求，
  纯本地相对路径资源，可被 file:// 直接加载（供 WKWebView loadFileURL 使用）。
-->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>WorkTime Justin</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="hud.css" />
  <link rel="stylesheet" href="secretword.css" />
  <link rel="stylesheet" href="task-templates.css" />
  <link rel="stylesheet" href="status-rewards.css" />
  <link rel="stylesheet" href="reward-chest.css" />
  <link rel="stylesheet" href="reward-fireworks.css" />
  <link rel="stylesheet" href="parent-controls.css" />
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="debug" class="debug-overlay" aria-hidden="true">
    <div>key: <span id="dbg-key">-</span></div>
    <div>mouse: <span id="dbg-mouse">-</span></div>
    <div>fps: <span id="dbg-fps">-</span></div>
    <div>audio: <span id="dbg-audio">locked</span></div>
  </div>

  <div id="esc-progress-wrap" class="esc-progress-wrap" aria-hidden="true">
    <div id="esc-progress-bar" class="esc-progress-bar"></div>
  </div>

  <!-- diag.js（017 旧机动画诊断日志，window.WTJ_DIAG）必须是本文件里**第一个** <script>——
       window.onerror/unhandledrejection 与资源加载失败/成功的 capture-phase 监听都要在其余
       脚本（manifest.js 起）解析/执行之前就位，才能捕获它们运行期间可能发生的错误。读取
       window.WTJ_MANIFEST / window.WTJ_TASK_TEMPLATES 等晚加载模块的部分自行做了 0ms 宏任务
       延后，不需要调整脚本顺序即可安全读到。经 window.webkit.messageHandlers.diag 上行给
       app/shell/main.swift，落盘到 ~/Library/Logs/WorkTimeJustin/animation-diagnostics.log。
       见 app/web/diag.js 顶部注释。 -->
  <script src="diag.js"></script>
  <script src="manifest.js"></script>
  <!-- WTJ-20260706-013：越早越好（紧跟 manifest.js 之后，早于所有引擎脚本），避免"先按
       CSS reduce-motion 规则画出静止终态、随后才被强制动画"这种一闪而过的样式跳变。若
       manifest.performance.honorReducedMotion 不为 true（kiosk 默认无视 OS「减弱动态」，
       核心学习动画照播），给 <html> 打上 data-wtj-motion-forced 属性——6 份 CSS
       （hud/parent-controls/reward-chest/task-templates/status-rewards/secretword）的
       @media (prefers-reduced-motion: reduce) 规则均已加 html:not([data-wtj-motion-forced])
       门，命中本属性时这些规则整体不生效，过渡/动画照常播放。honorReducedMotion=true 时
       不设置该属性，CSS 侧的 reduced-motion 覆盖恢复原样。Safari 14 语法基线：仅
       var/function，不用箭头函数/let/const/模板字符串/可选链。 -->
  <script>
    (function () {
      var m = window.WTJ_MANIFEST;
      var honor = !!(m && m.performance && m.performance.honorReducedMotion === true);
      if (!honor) {
        document.documentElement.setAttribute('data-wtj-motion-forced', '1');
      }
    })();
  </script>
  <!-- voice-language.js（018 家长控制卡：语言/任务语音模式切换，window.WTJ_VOICE_LANG）——
       只需 manifest.js 先加载（读取 MANIFEST.parentControls 的默认值展示用，判定本身用内置
       静态清单，不依赖 manifest）；需在 task.js 之前——task.js 的 playTaskVoiceDefensive()
       消费本文件的 resolveTaskVoicePath()。见 app/web/voice-language.js 顶部注释。 -->
  <script src="voice-language.js"></script>
  <!-- parent-controls.js（018 家长控制卡：隐藏家长菜单 web 层配套——Cmd+Q 长按进度条 / 安静
       锁屏叠层 / 设置面板，window.WTJ_PARENT_CONTROLS）——需在 manifest.js/voice-language.js
       之后（读取二者暴露的配置与可用性数据）、keyboard.js/pointer.js 之前——两者的 window
       级事件监听消费本文件暴露的 isInputSuspended() 做输入抑制判定（额度耗尽安静锁屏/设置
       面板打开期间不再触发游戏奖励/音效）。见 app/web/parent-controls.js 顶部注释。 -->
  <script src="parent-controls.js"></script>
  <!-- letter-motion.js（086 主界面视觉 polish：字母字形/motion 的 token + 纯函数模块，
       window.WTJ_LETTER_MOTION）——不依赖 document/canvas，只需 manifest.js 先加载（本文件
       自带一份不依赖 manifest 的 081 token 镜像，与 manifest.js 无强依赖，放在这里只是遵循
       "基础 token 类模块尽早加载"的既有顺序习惯）。需在 app.js 之前——app.js 的
       spawnLetter()/drawLetters() 消费本文件暴露的字体串/尺寸/缓动/逐帧状态纯函数。见
       app/web/letter-motion.js 顶部注释。 -->
  <script src="letter-motion.js"></script>
  <!-- sparkles.js（002 键盘字母流星拖尾，window.WTJ_SPARKLES）——SHARED: 与后续 003 卡（指针
       拖尾）共用的星点贴图预渲染 + 绘制层，见该文件顶部 "SHARED: consumed by card 003 pointer
       trail" 注释。不依赖 letter-motion.js/keyboard.js，只需 document 可用；需在 app.js 之前
       ——app.js 的 drawLetterTrail() 消费本文件的 getSparkleSprite()/drawSparkles()。放在
       letter-motion.js 之后只是沿用"基础 token/绘制层类模块尽早加载"的既有顺序习惯，无强依赖。 -->
  <script src="sparkles.js"></script>
  <!-- audio.js（016 音频/TTS/SFX manager，window.WTJ_AUDIO）——承接 077，消除 QA076 发现的
       缺口："index.html 从未加载 audio.js"，导致 secretword.js/task.js/task-templates.js/
       reward-chest.js/status-rewards.js 里早已写好的防御式调用
       （window.WTJ_AUDIO.playWord/playTaskVoice/playSfx）因 WTJ_AUDIO undefined 而全部
       静默 no-op、app 内 0 播放。audio.js 是自足 manager（无 import/export，不读取其它引擎
       暴露的 window.WTJ_*），对加载顺序没有硬依赖，这里放在 manifest.js 之后、其余引擎之前
       尽早加载，保证所有消费方运行时读到 window.WTJ_AUDIO 时它已就绪。见 app/web/audio.js
       顶部注释与 app/web/audio/AUDIO-API.md。 -->
  <script src="audio.js"></script>
  <!-- slots.js（010 五槽统一状态机）需在 keyboard.js 与 secretword.js 之前——这样两者首次
       点槽时 window.WTJ_SLOTS 已存在，走委托路径而非各自 fallback。只需 manifest.js 先加载；
       与 hud.js 加载顺序无强依赖（本文件对 WTJ_HUD 的调用发生在运行时，见 app/web/slots.js
       顶部注释）。见 app/web/slots/SLOTS-API.md。 -->
  <script src="slots.js"></script>
  <script src="keyboard.js"></script>
  <!-- keysound.js（084 逐键机械键盘反馈音，window.WTJ_KEYSOUND）需在 keyboard.js 与
       audio.js 之后——加载时立即订阅 window.WTJ_KEYBOARD.onLetter/onFunctionKey，播放走
       window.WTJ_AUDIO.playSfx()。只做"事件 → 播音效"接线，不做任何 DOM/Canvas 渲染
       （非字母键的视觉反馈归 086，见该文件顶部注释）。 -->
  <script src="keysound.js"></script>
  <!-- keyvisual.js（086 非字母键 subtle 视觉反馈，window.WTJ_KEYVISUAL）需在 keyboard.js 之后
       ——加载时立即订阅 window.WTJ_KEYBOARD.onFunctionKey（与 keysound.js 的同一事件订阅并存，
       互不干扰，见该文件顶部注释）；需在 app.js 之前——app.js 的 draw() 循环每帧调用本文件
       暴露的 draw()/getStageLightBoost() 把反馈画到同一张 #stage canvas 上，不新开
       canvas/rAF。只做非字母键的**视觉**反馈，不做任何音频。 -->
  <script src="keyvisual.js"></script>
  <!-- pointer.js 需在 keyboard.js 之后、app.js 之前——app.js 初始化时要读
       window.WTJ_POINTER.onMove/onClickFeedback 完成订阅。见 app/web/pointer.js 顶部注释。 -->
  <script src="pointer.js"></script>
  <!-- pointer-trail.js（003 鼠标尾迹星光化，window.WTJ_POINTER_TRAIL）——纯参数生成器，不依赖
       document/canvas/WTJ_POINTER 本身，对加载顺序无强依赖，只需在 app.js 之前（app.js 的
       spawnTrailPoint()/drawTrail() 消费本文件的 classifyClickTier()/classifyDropTier()/
       buildTrailSparkles()/computeTierAlphaCap()/computeDropAvoidanceFactor()）。放在
       pointer.js 之后只是沿用"同主题模块相邻"的既有顺序习惯。见 app/web/pointer-trail.js
       顶部注释。 -->
  <script src="pointer-trail.js"></script>
  <script src="app.js"></script>
  <script src="hud.js"></script>
  <!-- secretword.js 需在 keyboard.js 之后（订阅 WTJ_KEYBOARD.onLetter）；放在 hud.js 之后
       确保命中时 WTJ_HUD.setSlot 已就绪（五槽联动）。见 app/web/secretword/SECRETWORD-API.md。 -->
  <script src="secretword.js"></script>
  <!-- task.js（013 任务生命周期框架，此前未 wire，接入留 014/019）需在 hud.js/keyboard.js
       之后（订阅 WTJ_HUD.onQuestionClick、WTJ_KEYBOARD.onEffectiveKey）。见 app/web/task/TASK-API.md。 -->
  <script src="task.js"></script>
  <!-- anim-manifest.js（056 降采样构建产物，window.WTJ_ANIM_MANIFEST）+ frame-anim.js
       （056 生产动效帧序列播放引擎，window.WTJ_FRAME_ANIM）：anim-manifest.js 需在
       frame-anim.js 之前（后者读取前者暴露的数据）；frame-anim.js 需在 manifest.js 之后
       （读取 performance.idleStopSec）、task-templates.js（014）与 reward-chest.js（011）
       之前——两者都调用本引擎的 play()/stop()/getDuration()。见
       app/web/anim/FRAME-ANIM-API.md。 -->
  <script src="anim-manifest.js"></script>
  <script src="frame-anim.js"></script>
  <!-- reward-fireworks.js（005 可复用奖励烟花/粒子系统，window.WTJ_REWARD_FIREWORKS）需在
       manifest.js 之后（读取 performance.particleTier/maxParticles）、消费方
       status-rewards.js（015）/reward-chest.js（011）之前——两者都调用本引擎的 play()/
       stop()/stopAll()。与 frame-anim.js 是两个独立引擎（前者是逐帧 sprite 播放器，本引擎是
       动态粒子物理），加载顺序上无强依赖，放在这里只是紧邻同为"引擎类、供后续消费方调用"的
       frame-anim.js，沿用既有顺序习惯。见 app/web/reward-fireworks.js 顶部注释。 -->
  <script src="reward-fireworks.js"></script>
  <!-- task-templates.js（014 四类任务模板）需在 task.js/pointer.js/keyboard.js/frame-anim.js
       之后——订阅 WTJ_TASK.onQuestionClicked、用 WTJ_POINTER.registerTarget、
       WTJ_KEYBOARD.onLetter、WTJ_FRAME_ANIM.play（faucet/horse/lamp 道具动效，056 接入）。
       见 app/web/task-templates.js 顶部注释。 -->
  <script src="task-templates.js"></script>
  <!-- status-rewards.js（015 工作状态灯「今日工作完成」连续奖励）需在 task-templates.js
       之后——订阅它暴露的 WTJ_TASK_TEMPLATES.onTaskComplete 事件累计连续完成计数；也需在
       reward-fireworks.js（005）之后——每次任务完成时用它 play('starburst'|'round-bloom',
       {...}) 播放即时反馈（005 起取代此前的 sparkle burst + 成功环）。见
       app/web/status-rewards.js 顶部注释。 -->
  <script src="status-rewards.js"></script>
  <!-- reward-chest.js（011 宝箱开启 + 烟花 + 一次性大奖励）需在 slots.js（010）之后——订阅它
       暴露的 WTJ_SLOTS.onFull 事件，五槽满时播放宝箱奖励序列，播完调用 WTJ_SLOTS.reset()
       清槽开新一轮；也需在 frame-anim.js（056）之后——宝箱本体的 opening 分帧动效改由
       WTJ_FRAME_ANIM.play() 驱动（056 接入）；也需在 reward-fireworks.js（005）之后——烟花
       表现改由 WTJ_REWARD_FIREWORKS.play('molten-fountain', {...}) 驱动（005 起取代本文件
       此前自带的 BURST_SCHEDULE 粒子引擎）。与 hud.js/audio.js 加载顺序无强依赖（调用均走
       防御式包装）。见 app/web/reward-chest.js 顶部注释。 -->
  <script src="reward-chest.js"></script>
</body>
</html>
